name: BixisNavigator
version: ${project.version}
main: com.bixis.navigator.BixisNavigator
api-version: '26.1.2'
authors: [Bixis]
description: Hotbar navigation plugin for the Bixis network

commands:
  bixisnav:
    description: BixisNavigator yönetim komutu
    usage: /bixisnav <on|off>

permissions:
  bixisnavigator.admin:
    description: Navigator hotbar'ı aç/kapat (builder mode)
    default: op
